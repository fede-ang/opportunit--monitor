function doPost(e) {
  const update    = JSON.parse(e.postData.contents);
  const msg       = update.message;
  if (!msg) return ContentService.createTextOutput("ok");

  const chat_id   = msg.chat.id;
  const thread_id = msg.message_thread_id || null;

  // Prima manda conferma a Telegram
  const payload = {
    chat_id: chat_id,
    text: "⏳ Messaggio ricevuto, elaborazione in corso..."
  };
  if (thread_id) payload.message_thread_id = thread_id;

  UrlFetchApp.fetch(
    `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`,
    {
      method: "post",
      headers: { "Content-Type": "application/json" },
      payload: JSON.stringify(payload)
    }
  );

  // Poi sveglia GitHub Actions
  UrlFetchApp.fetch(
    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${GITHUB_WORKFLOW}/dispatches`,
    {
      method: "post",
      headers: {
        "Authorization": `Bearer ${GITHUB_TOKEN}`,
        "Accept": "application/vnd.github+json",
        "Content-Type": "application/json"
      },
      payload: JSON.stringify({ ref: "main" })
    }
  );

  return ContentService.createTextOutput("ok");
}

function doGet(e) {
  return ContentService.createTextOutput("Apps Script attivo");
}
